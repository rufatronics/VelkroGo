name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── CLI / TUI + Daemon (pure Go, CGO_ENABLED=0, cross-compile from Linux) ──
  build-cli:
    name: Build CLI (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build CLI tools (CGO disabled — pure Go)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VER=${{ github.ref_name }}
          LDFLAG="-s -w -X main.version=${VER}"
          go build -ldflags="${LDFLAG}" -o dist/velkrod-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/velkrod
          go build -ldflags="${LDFLAG}" -o dist/velkro-${{ matrix.suffix }}${{ matrix.ext }}  ./cmd/velkro

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: dist/

  # ── Native GUI (Fyne, CGO required — build on each OS natively) ────────────
  build-gui-linux:
    name: Build GUI (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev \
            libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev

      - name: Build GUI (Linux x64)
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/velkroapp-linux-amd64 ./cmd/velkroapp

      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: dist/

  build-gui-windows:
    name: Build GUI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build GUI (Windows x64)
        run: |
          mkdir dist
          go build -ldflags="-s -w -H windowsgui -X main.version=${{ github.ref_name }}" `
            -o dist\velkroapp-windows-amd64.exe .\cmd\velkroapp

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: dist/

  # ── Release: gather all artifacts and publish ──────────────────────────────
  release:
    name: Create Release
    needs: [build-cli, build-gui-linux, build-gui-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VelkroGo ${{ github.ref_name }}
          body: |
            ## VelkroGo ${{ github.ref_name }}

            Self-hosted AI agent for Windows & Linux — coding agent + computer-use agent.

            ### Downloads

            | Binary | Platform | Description |
            |---|---|---|
            | `velkroapp-linux-amd64` | Linux x64 | **Native GUI app** (recommended) |
            | `velkroapp-windows-amd64.exe` | Windows x64 | **Native GUI app** (recommended) |
            | `velkro-linux-amd64` | Linux x64 | Terminal (TUI) client |
            | `velkro-windows-amd64.exe` | Windows x64 | Terminal (TUI) client |
            | `velkrod-linux-amd64` | Linux x64 | Headless daemon |
            | `velkrod-linux-arm64` | Linux ARM64 | Headless daemon |
            | `velkrod-windows-amd64.exe` | Windows x64 | Headless daemon |

            ### Quick start (GUI)
            ```bash
            chmod +x velkroapp-linux-amd64   # Linux
            ./velkroapp-linux-amd64
            ```
            First launch opens a setup dialog — pick your AI provider and enter your API key.

            ### Supported providers
            Anthropic · OpenAI · Google Gemini · DeepSeek · Groq · Mistral · xAI · Together · Perplexity · Cohere · OpenRouter · Fireworks · Cerebras · Ollama · LM Studio · Custom

            See [HOWTOUSE.md](https://github.com/rufatronics/VelkroGo/blob/main/HOWTOUSE.md) for full documentation.
          files: dist/**
          draft: false
          prerelease: false
